<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Capacitaciones | Luis Arceo S.R.L.</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  :root { --brown:#3a2317;--brown-mid:#5c3820;--gold:#b8860b;--gold-light:#d4a017;--gold-pale:#f5e9c8;--gray-bg:#f5f2ee;--gray-border:#e0d8cc;--gray-text:#6b5c4e;--green:#1a6632;--green-light:#d4edda;--red:#8b1a1a;--red-light:#fde8e8;--yellow-light:#fef9e7; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--gray-bg);min-height:100vh;color:var(--brown);}
  .login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,var(--brown) 0%,#5c3820 50%,var(--brown) 100%);}
  .logos-row{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:18px;flex-wrap:wrap;}
  .logo-img{height:72px;width:auto;object-fit:contain;background:white;border-radius:8px;padding:6px 10px;}
  .divider-line{width:1px;height:56px;background:rgba(255,255,255,0.3);}
  .header-title{font-size:20px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:white;text-align:center;}
  .header-subtitle{font-size:13px;color:var(--gold-light);margin-top:3px;letter-spacing:0.5px;text-align:center;}
  .login-tabs{display:flex;background:rgba(255,255,255,0.1);border-radius:10px;padding:4px;margin:18px 0 20px;width:100%;max-width:380px;}
  .tab-btn{flex:1;padding:10px 12px;border:none;background:transparent;color:rgba(255,255,255,0.65);font-size:13px;font-weight:600;cursor:pointer;border-radius:7px;transition:all 0.2s;}
  .tab-btn.active{background:#fff;color:var(--brown);}
  .login-card{background:white;border-radius:14px;padding:26px;width:100%;max-width:380px;box-shadow:0 12px 40px rgba(0,0,0,0.25);}
  .login-card-title{font-size:15px;font-weight:700;color:var(--brown);margin-bottom:18px;border-bottom:2px solid var(--gold-pale);padding-bottom:10px;}
  .form-group{margin-bottom:14px;}
  .form-label{display:block;font-size:11px;font-weight:700;color:var(--gray-text);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px;}
  .form-input,.form-select{width:100%;padding:11px 13px;border:1.5px solid var(--gray-border);border-radius:7px;font-size:14px;color:var(--brown);background:#faf8f5;transition:border-color 0.2s;outline:none;appearance:none;-webkit-appearance:none;}
  .form-input:focus,.form-select:focus{border-color:var(--gold);background:white;}
  .btn-login{width:100%;padding:13px;background:var(--brown);color:white;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
  .btn-login:hover{background:var(--brown-mid);}
  .error-msg{color:var(--red);font-size:12px;margin-top:8px;text-align:center;min-height:18px;}
  .topbar{background:var(--brown);color:white;padding:0 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:56px;}
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .topbar-logo{height:38px;width:auto;object-fit:contain;background:white;border-radius:5px;padding:3px 6px;}
  .topbar-title{font-size:14px;font-weight:700;line-height:1.2;}
  .topbar-sub{font-size:11px;color:var(--gold-light);}
  .logout-btn{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}
  .app{display:none;min-height:100vh;background:var(--gray-bg);}
  .app.visible{display:block;}
  .nav-tabs{display:flex;background:white;border-bottom:2px solid var(--gray-border);padding:0 16px;overflow-x:auto;scrollbar-width:none;}
  .nav-tabs::-webkit-scrollbar{display:none;}
  .nav-tab{padding:13px 14px;font-size:13px;font-weight:500;color:var(--gray-text);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all 0.2s;}
  .nav-tab.active{color:var(--brown);border-bottom-color:var(--gold);font-weight:700;}
  .content{padding:16px;max-width:860px;margin:0 auto;}
  .card{background:white;border-radius:12px;padding:18px;margin-bottom:14px;border:1px solid var(--gray-border);}
  .card-title{font-size:15px;font-weight:700;color:var(--brown);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
  .btn{padding:9px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;}
  .btn-brown{background:var(--brown);color:white;} .btn-brown:hover{background:var(--brown-mid);}
  .btn-gold{background:var(--gold);color:white;}
  .btn-green{background:var(--green);color:white;}
  .btn-red{background:var(--red);color:white;}
  .btn-outline{background:transparent;border:1.5px solid var(--brown);color:var(--brown);}
  .btn-sm{padding:6px 11px;font-size:12px;}
  .btn:disabled{opacity:0.45;cursor:not-allowed;}
  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
  .badge-green{background:var(--green-light);color:var(--green);}
  .badge-yellow{background:var(--yellow-light);color:#7d5a00;}
  .badge-red{background:var(--red-light);color:var(--red);}
  .badge-brown{background:var(--gold-pale);color:var(--brown);}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:380px;}
  th{background:#faf3e8;color:var(--brown);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:9px 11px;text-align:left;border-bottom:2px solid var(--gold-pale);white-space:nowrap;}
  td{padding:9px 11px;border-bottom:1px solid var(--gray-border);color:#3a2317;vertical-align:middle;}
  tr:last-child td{border-bottom:none;} tr:hover td{background:#faf8f4;}
  .training-card{border:1.5px solid var(--gray-border);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;}
  .training-card:hover{border-color:var(--gold);background:#fdfaf4;}
  .training-card h3{font-size:14px;font-weight:700;color:var(--brown);margin-bottom:5px;}
  .training-meta{font-size:12px;color:var(--gray-text);display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
  .stat-box{background:white;border:1px solid var(--gray-border);border-radius:10px;padding:14px;text-align:center;}
  .stat-num{font-size:30px;font-weight:800;color:var(--brown);}
  .stat-label{font-size:11px;color:var(--gray-text);margin-top:3px;font-weight:600;}
  .stat-box.green{background:var(--green-light);border-color:#a8d5b5;} .stat-box.green .stat-num{color:var(--green);}
  .stat-box.yellow{background:var(--yellow-light);border-color:#f0d98a;} .stat-box.yellow .stat-num{color:#7d5a00;}
  .file-drop{border:2px dashed var(--gray-border);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;color:var(--gray-text);}
  .file-drop:hover{border-color:var(--gold);color:var(--brown);background:#fdfaf4;}
  .file-drop input{display:none;}
  .question-box{background:#faf8f5;border:1px solid var(--gray-border);border-radius:9px;padding:14px;margin-bottom:12px;}
  .question-num{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
  .question-box input[type="text"]{width:100%;padding:8px 11px;border:1.5px solid var(--gray-border);border-radius:6px;font-size:13px;color:var(--brown);margin-bottom:8px;outline:none;background:white;}
  .question-box input[type="text"]:focus{border-color:var(--gold);}
  .option-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
  .option-row input[type="text"]{flex:1;margin-bottom:0;}
  .option-row input[type="radio"]{width:16px;height:16px;cursor:pointer;accent-color:var(--gold);}
  .progress-bar{background:var(--gray-border);border-radius:999px;height:8px;overflow:hidden;}
  .progress-fill{background:var(--gold);height:100%;border-radius:999px;transition:width 0.4s;}
  .progress-fill.full{background:var(--green);}
  .quiz-option{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--gray-border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;font-size:14px;color:var(--brown);}
  .quiz-option:hover{border-color:var(--gold);background:#fdfaf4;}
  .quiz-option.selected{border-color:var(--gold);background:#fef9ec;}
  .quiz-letter{width:26px;height:26px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;font-weight:800;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;overflow-y:auto;}
  .modal{background:white;border-radius:14px;padding:22px;width:100%;max-width:700px;margin:auto;}
  .modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;gap:12px;}
  .modal-title{font-size:17px;font-weight:800;color:var(--brown);line-height:1.3;}
  .close-btn{background:var(--gray-bg);border:none;width:30px;height:30px;min-width:30px;border-radius:50%;cursor:pointer;font-size:16px;color:var(--gray-text);display:flex;align-items:center;justify-content:center;}
  .gold-bar{height:3px;background:var(--gold);border-radius:2px;margin-bottom:16px;}
  .empty-state{text-align:center;padding:40px 20px;color:var(--gray-text);}
  .empty-icon{font-size:44px;margin-bottom:12px;}
  .empty-title{font-size:15px;font-weight:700;color:var(--brown);margin-bottom:6px;}
  .approved-banner{background:var(--green-light);border:1.5px solid #a8d5b5;border-radius:10px;padding:14px 16px;text-align:center;margin-bottom:16px;}
  .loading-overlay{position:fixed;inset:0;background:rgba(58,35,23,0.9);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;gap:16px;}
  .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.3);border-top-color:var(--gold-light);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media(max-width:480px){.content{padding:10px;}.modal{padding:16px;}.topbar-logo{height:32px;}}
</style>
</head>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyAie0hXA1ZYs9ocgZ1V6lseNWk8oWejI_c",
  authDomain: "capacitaciones-luis-arceo-srl.firebaseapp.com",
  projectId: "capacitaciones-luis-arceo-srl",
  storageBucket: "capacitaciones-luis-arceo-srl.firebasestorage.app",
  messagingSenderId: "114036642100",
  appId: "1:114036642100:web:9e10fd8ac5406a7a9d1561"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var state = {currentUser:null,isAdmin:false,activeTab:0,padron:[],capacitaciones:[],cumplimientos:{},editingCap:null,quizState:null};

function showLoading(msg){document.getElementById("loadingOverlay").style.display="flex";document.getElementById("loadingMsg").textContent=msg||"Cargando...";}
function hideLoading(){document.getElementById("loadingOverlay").style.display="none";}

async function loadState(){
  try{
    var padronSnap=await db.collection("padron").get();
    state.padron=padronSnap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    var capsSnap=await db.collection("capacitaciones").get();
    state.capacitaciones=capsSnap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    var cumpSnap=await db.collection("cumplimientos").get();
    state.cumplimientos={};
    cumpSnap.docs.forEach(function(d){state.cumplimientos[d.id]=d.data();});
  }catch(e){console.error("Error cargando:",e);throw e;}
}

async function savePadronItem(p){await db.collection("padron").doc(p.dni).set({nombre:p.nombre,dni:p.dni,sector:p.sector});}
async function deletePadronItem(dni){await db.collection("padron").doc(dni).delete();}
async function saveCapacitacion(cap){
  var id=cap.id||("cap_"+Date.now());
  var data=Object.assign({},cap,{id:id});
  await db.collection("capacitaciones").doc(id).set(data);
  return id;
}
async function deleteCapacitacion(id){await db.collection("capacitaciones").doc(id).delete();}
async function saveCumplimiento(key,data){await db.collection("cumplimientos").doc(key).set(data);}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function openModal(html){document.getElementById("modalContent").innerHTML=html;document.getElementById("modalOverlay").style.display="flex";document.getElementById("modalOverlay").scrollTop=0;}
function closeModal(){document.getElementById("modalOverlay").style.display="none";}
function closeModalBg(e){if(e.target===document.getElementById("modalOverlay"))closeModal();}

function switchTab(type){
  document.querySelectorAll(".tab-btn").forEach(function(b,i){b.classList.toggle("active",(i===0&&type==="personal")||(i===1&&type==="admin"));});
  document.getElementById("personalLogin").style.display=type==="personal"?"block":"none";
  document.getElementById("adminLogin").style.display=type==="admin"?"block":"none";
}

function loginPersonal(){
  var nombre=document.getElementById("pNombre").value.trim();
  var dni=document.getElementById("pDNI").value.trim();
  var sector=document.getElementById("pSector").value;
  document.getElementById("pError").textContent="";
  if(!nombre||!dni||!sector){document.getElementById("pError").textContent="Completá todos los campos.";return;}
  if(state.padron.length>0){
    var found=state.padron.find(function(p){return p.dni===dni;});
    if(!found){document.getElementById("pError").textContent="DNI no encontrado en el padrón. Consultá al administrador.";return;}
  }
  state.currentUser={nombre:nombre,dni:dni,sector:sector};
  state.isAdmin=false;
  showApp();
}

function loginAdmin(){
  var user=document.getElementById("aUser").value.trim();
  var pass=document.getElementById("aPass").value.trim();
  document.getElementById("aError").textContent="";
  if(user==="Romina"&&pass==="R0mina"){state.currentUser={nombre:"Romina",dni:"admin"};state.isAdmin=true;showApp();}
  else{document.getElementById("aError").textContent="Usuario o contraseña incorrectos.";}
}

function logout(){
  state.currentUser=null;state.isAdmin=false;state.activeTab=0;
  document.getElementById("loginScreen").style.display="flex";
  document.getElementById("mainApp").classList.remove("visible");
  ["pNombre","pDNI","aUser","aPass"].forEach(function(id){document.getElementById(id).value="";});
  document.getElementById("pSector").value="";
}

function showApp(){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("mainApp").classList.add("visible");
  document.getElementById("topbarTitle").textContent=state.isAdmin?"⚙️ Admin":state.currentUser.nombre;
  buildNav();renderTab(0);
}

function buildNav(){
  var tabs=state.isAdmin?["👥 Padrón","📁 Capacitaciones","📊 Cumplimiento"]:["📚 Capacitaciones","🏆 Mis logros"];
  document.getElementById("navTabs").innerHTML=tabs.map(function(t,i){return'<div class="nav-tab'+(i===state.activeTab?" active":"")+'" onclick="renderTab('+i+')">'+t+"</div>";}).join("");
}

function renderTab(i){state.activeTab=i;buildNav();if(state.isAdmin){if(i===0)renderPadron();else if(i===1)renderAdminCaps();else renderCumplimiento();}else{if(i===0)renderUserCaps();else renderMisLogros();}}

function renderPadron(){
  document.getElementById("mainContent").innerHTML='<div class="card"><div class="card-title"><span>👥 Padrón de Personal</span><div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="btn btn-brown btn-sm" onclick="showAddPersona()">+ Agregar</button><label class="btn btn-outline btn-sm" style="cursor:pointer;">📂 CSV<input type="file" accept=".csv" style="display:none;" onchange="importCSV(event)"></label><button class="btn btn-gold btn-sm" onclick="exportCSVPadron()">⬇ Exportar</button></div></div><p style="font-size:12px;color:#6b5c4e;margin-bottom:12px;">CSV: columnas Nombre, DNI, Sector.</p><div id="padronTable">'+renderPadronTable()+"</div></div>";
}

function renderPadronTable(){
  if(state.padron.length===0)return'<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-title">Sin personal cargado</div></div>';
  return'<div class="table-wrap"><table><thead><tr><th>Nombre</th><th>DNI</th><th>Sector</th><th></th></tr></thead><tbody>'+
    state.padron.map(function(p){return'<tr><td><strong>'+esc(p.nombre)+'</strong></td><td>'+esc(p.dni)+'</td><td><span class="badge badge-brown">'+esc(p.sector)+'</span></td><td><button class="btn btn-red btn-sm" onclick="removePersona(''+p.dni+'')">✕</button></td></tr>';}).join("")+
    "</tbody></table></div>";
}

function showAddPersona(){
  openModal('<div class="modal-header"><div class="modal-title">➕ Agregar persona</div><button class="close-btn" onclick="closeModal()">✕</button></div><div class="gold-bar"></div>'+
    '<div class="form-group"><label class="form-label">Nombre y Apellido</label><input class="form-input" id="newNombre" placeholder="Nombre completo"></div>'+
    '<div class="form-group"><label class="form-label">DNI</label><input class="form-input" id="newDNI" type="number" placeholder="Número de DNI"></div>'+
    '<div class="form-group"><label class="form-label">Sector</label><select class="form-select" id="newSector"><option value="">Seleccioná...</option><option>Cocina y Maestranza</option><option>Trailer y Flota Pesada</option><option>Administración</option></select></div>'+
    '<button class="btn btn-brown" style="width:100%" onclick="savePersona()">Guardar</button>');
}

async function savePersona(){
  var nombre=document.getElementById("newNombre").value.trim(),dni=document.getElementById("newDNI").value.trim(),sector=document.getElementById("newSector").value;
  if(!nombre||!dni||!sector){alert("Completá todos los campos.");return;}
  if(state.padron.find(function(p){return p.dni===dni;})){alert("Ya existe una persona con ese DNI.");return;}
  showLoading("Guardando...");
  try{await savePadronItem({nombre:nombre,dni:dni,sector:sector});state.padron.push({nombre:nombre,dni:dni,sector:sector});closeModal();renderPadron();}catch(e){alert("Error al guardar.");}finally{hideLoading();}
}

async function removePersona(dni){
  if(!confirm("¿Eliminar esta persona?"))return;
  showLoading("Eliminando...");
  try{await deletePadronItem(dni);state.padron=state.padron.filter(function(p){return p.dni!==dni;});renderPadron();}catch(e){alert("Error.");}finally{hideLoading();}
}

function importCSV(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=async function(ev){
    var lines=ev.target.result.split("
").filter(function(l){return l.trim();});
    var added=0;
    for(var line of lines){
      var parts=line.split(",").map(function(s){return s.trim().replace(/"/g,"");});
      if(parts.length>=3&&parts[0]&&parts[1]&&parts[2]&&!state.padron.find(function(p){return p.dni===parts[1];})){
        try{await savePadronItem({nombre:parts[0],dni:parts[1],sector:parts[2]});state.padron.push({nombre:parts[0],dni:parts[1],sector:parts[2]});added++;}catch(e){}
      }
    }
    renderPadron();alert(added+" persona(s) importadas.");
  };
  reader.readAsText(file);
}

function exportCSVPadron(){downloadCSV([["Nombre","DNI","Sector"]].concat(state.padron.map(function(p){return[p.nombre,p.dni,p.sector];})),"padron_personal.csv");}

function renderAdminCaps(){
  document.getElementById("mainContent").innerHTML='<div class="card"><div class="card-title"><span>📁 Capacitaciones</span><button class="btn btn-brown btn-sm" onclick="showNewCap()">+ Nueva</button></div><div id="capsList">'+renderCapsList()+"</div></div>";
}

function renderCapsList(){
  if(state.capacitaciones.length===0)return'<div class="empty-state"><div class="empty-icon">📁</div><div class="empty-title">Sin capacitaciones</div><p>Creá la primera usando el botón "Nueva".</p></div>';
  return state.capacitaciones.map(function(c){
    return'<div class="training-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;"><div style="flex:1;min-width:0;"><h3>'+esc(c.titulo)+'</h3><div class="training-meta">'+(c.fileName?'<span>📄 '+esc(c.fileName)+'</span>':'')+'<span>❓ '+(c.preguntas?c.preguntas.length:0)+' preguntas</span><span class="badge badge-green">Activa</span></div></div><div style="display:flex;gap:6px;flex-shrink:0;"><button class="btn btn-outline btn-sm" onclick="editCap(''+c.id+'')">✏️ Editar</button><button class="btn btn-red btn-sm" onclick="deleteCap(''+c.id+'')">🗑</button></div></div></div>';
  }).join("");
}

function showNewCap(){
  state.editingCap={titulo:"",fileData:null,fileName:"",fileType:"",preguntas:Array(6).fill(null).map(function(){return{texto:"",opciones:["","",""],respuesta:0};})};
  openCapModal();
}

function editCap(id){
  var cap=state.capacitaciones.find(function(c){return c.id===id;});if(!cap)return;
  state.editingCap=JSON.parse(JSON.stringify(cap));
  while(state.editingCap.preguntas.length<6)state.editingCap.preguntas.push({texto:"",opciones:["","",""],respuesta:0});
  openCapModal();
}

function openCapModal(){
  var c=state.editingCap;
  var qsHtml=c.preguntas.map(function(q,qi){
    return'<div class="question-box"><div class="question-num">Pregunta '+(qi+1)+'</div>'+
      '<input type="text" id="qtext_'+qi+'" value="'+esc(q.texto||"")+'" placeholder="Escribí la pregunta...">'+
      [0,1,2].map(function(oi){return'<div class="option-row"><input type="radio" name="correct_'+qi+'" value="'+oi+'" '+(q.respuesta===oi?"checked":"")+' onchange="setCorrect('+qi+','+oi+')"><input type="text" id="qopt_'+qi+'_'+oi+'" value="'+esc(q.opciones[oi]||"")+'" placeholder="Opción '+(oi+1)+'"></div>';}).join("")+
      '<div style="font-size:11px;color:#a09080;margin-top:4px;">● Marcá el círculo de la respuesta correcta</div></div>';
  }).join("");
  openModal('<div class="modal-header"><div class="modal-title">'+(c.id?"✏️ Editar":"➕ Nueva")+' Capacitación</div><button class="close-btn" onclick="closeModal()">✕</button></div><div class="gold-bar"></div>'+
    '<div class="form-group"><label class="form-label">Título</label><input class="form-input" id="capTitulo" value="'+esc(c.titulo||"")+'" placeholder="Ej: Uso de EPP"></div>'+
    '<div class="form-group"><label class="form-label">Archivo (PDF o PowerPoint)</label><div class="file-drop" onclick="document.getElementById('fileInput').click()"><div style="font-size:28px;margin-bottom:6px;">📂</div><div id="fileLabel" style="font-weight:600;">'+(c.fileName?"✅ "+esc(c.fileName):"Tocar para subir PDF o PPT")+'</div><div style="font-size:12px;margin-top:4px;">Máx. 15 MB</div><input type="file" id="fileInput" accept=".pdf,.ppt,.pptx" onchange="handleFileUpload(event)"></div></div>'+
    '<div><div style="font-size:12px;font-weight:700;color:#6b5c4e;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">Evaluación — 6 preguntas</div><div id="questionsContainer">'+qsHtml+'</div></div>'+
    '<button class="btn btn-green" style="width:100%;margin-top:4px;" onclick="saveCap()">💾 Guardar capacitación</button>');
}

function setCorrect(qi,oi){if(state.editingCap&&state.editingCap.preguntas[qi])state.editingCap.preguntas[qi].respuesta=parseInt(oi);}

function handleFileUpload(event){
  var file=event.target.files[0];if(!file)return;
  if(file.size>15*1024*1024){alert("El archivo supera 15 MB.");return;}
  document.getElementById("fileLabel").textContent="⏳ Cargando "+file.name+"...";
  var reader=new FileReader();
  reader.onload=function(e){state.editingCap.fileData=e.target.result;state.editingCap.fileName=file.name;state.editingCap.fileType=file.type;document.getElementById("fileLabel").textContent="✅ "+file.name;};
  reader.readAsDataURL(file);
}

async function saveCap(){
  var titulo=document.getElementById("capTitulo").value.trim();
  if(!titulo){alert("Ingresá un título.");return;}
  var preguntas=state.editingCap.preguntas.map(function(q,qi){
    return{texto:document.getElementById("qtext_"+qi).value.trim()||q.texto,opciones:[0,1,2].map(function(oi){return document.getElementById("qopt_"+qi+"_"+oi).value.trim();}),respuesta:q.respuesta};
  });
  for(var i=0;i<preguntas.length;i++){
    if(!preguntas[i].texto){alert("Completá la pregunta "+(i+1)+".");return;}
    if(preguntas[i].opciones.some(function(o){return!o;})){alert("Completá todas las opciones de la pregunta "+(i+1)+".");return;}
  }
  var cap={titulo:titulo,fileData:state.editingCap.fileData||"",fileName:state.editingCap.fileName||"",fileType:state.editingCap.fileType||"",preguntas:preguntas,creado:state.editingCap.creado||new Date().toLocaleDateString("es-AR")};
  if(state.editingCap.id)cap.id=state.editingCap.id;
  showLoading("Guardando capacitación...");
  try{
    var id=await saveCapacitacion(cap);cap.id=id;
    if(state.editingCap.id){var idx=state.capacitaciones.findIndex(function(c){return c.id===state.editingCap.id;});if(idx>=0)state.capacitaciones[idx]=cap;}
    else state.capacitaciones.push(cap);
    closeModal();renderAdminCaps();
  }catch(e){alert("Error al guardar. El archivo puede ser muy grande.");}finally{hideLoading();}
}

async function deleteCap(id){
  if(!confirm("¿Eliminar esta capacitación?"))return;
  showLoading("Eliminando...");
  try{await deleteCapacitacion(id);state.capacitaciones=state.capacitaciones.filter(function(c){return c.id!==id;});renderAdminCaps();}catch(e){alert("Error.");}finally{hideLoading();}
}

function renderCumplimiento(){
  var totCaps=state.capacitaciones.length,cumplidos=0,pendientes=0;
  var rows=state.padron.map(function(p){
    var comp=state.capacitaciones.filter(function(c){var k=p.dni+"_"+c.id;return state.cumplimientos[k]&&state.cumplimientos[k].aprobado;}).length;
    var pct=totCaps>0?Math.round((comp/totCaps)*100):0;
    if(pct===100)cumplidos++;else pendientes++;
    return{p:p,comp:comp,pct:pct};
  });
  var html='<div class="stats-grid"><div class="stat-box"><div class="stat-num">'+state.padron.length+'</div><div class="stat-label">Personal</div></div><div class="stat-box"><div class="stat-num">'+totCaps+'</div><div class="stat-label">Capacitaciones</div></div><div class="stat-box green"><div class="stat-num">'+cumplidos+'</div><div class="stat-label">Completaron todo</div></div><div class="stat-box yellow"><div class="stat-num">'+pendientes+'</div><div class="stat-label">Con pendientes</div></div></div>';
  html+='<div class="card"><div class="card-title"><span>📊 Detalle</span><button class="btn btn-green btn-sm" onclick="exportExcel()">⬇ Exportar Excel</button></div>';
  html+=rows.length===0?'<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Sin personal en el padrón</div></div>':
    '<div class="table-wrap"><table><thead><tr><th>Nombre</th><th>DNI</th><th>Sector</th><th>Avance</th><th>Estado</th></tr></thead><tbody>'+
    rows.map(function(r){return'<tr><td><strong>'+esc(r.p.nombre)+'</strong></td><td>'+esc(r.p.dni)+'</td><td><span class="badge badge-brown">'+esc(r.p.sector)+'</span></td><td><div style="min-width:80px;"><div style="font-size:11px;color:#6b5c4e;margin-bottom:3px;">'+r.comp+'/'+totCaps+'</div><div class="progress-bar"><div class="progress-fill '+(r.pct===100?"full":"")+'" style="width:'+r.pct+'%"></div></div></div></td><td><span class="badge '+(r.pct===100?"badge-green":r.pct>0?"badge-yellow":"badge-red")+'">'+(r.pct===100?"✅ Completo":r.pct>0?r.pct+"% parcial":"⏳ Pendiente")+'</span></td></tr>';}).join("")+
    "</tbody></table></div>";
  html+="</div>";
  state.capacitaciones.forEach(function(c){
    var aprobados=state.padron.filter(function(p){var k=p.dni+"_"+c.id;return state.cumplimientos[k]&&state.cumplimientos[k].aprobado;});
    html+='<div class="card"><div class="card-title"><span>📋 '+esc(c.titulo)+'</span><span class="badge badge-brown">'+aprobados.length+'/'+state.padron.length+' aprobaron</span></div>';
    html+=aprobados.length>0?'<div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Sector</th><th>Nota</th><th>Fecha</th></tr></thead><tbody>'+aprobados.map(function(p){var cump=state.cumplimientos[p.dni+"_"+c.id];return'<tr><td>'+esc(p.nombre)+'</td><td>'+esc(p.sector)+'</td><td><span class="badge badge-green">'+cump.nota+'%</span></td><td style="font-size:12px;color:#6b5c4e;">'+(cump.fecha||"")+'</td></tr>';}).join("")+"</tbody></table></div>":'<div style="font-size:13px;color:#a09080;padding:8px 0;">Nadie aprobó esta capacitación todavía.</div>';
    html+="</div>";
  });
  document.getElementById("mainContent").innerHTML=html;
}

function exportExcel(){
  var totCaps=state.capacitaciones.length;
  var rows=[["Nombre","DNI","Sector","Completadas","Total","% Cumplimiento","Estado"]];
  state.padron.forEach(function(p){
    var comp=state.capacitaciones.filter(function(c){var k=p.dni+"_"+c.id;return state.cumplimientos[k]&&state.cumplimientos[k].aprobado;}).length;
    var pct=totCaps>0?Math.round((comp/totCaps)*100):0;
    rows.push([p.nombre,p.dni,p.sector,comp,totCaps,pct+"%",pct===100?"Completo":pct>0?"Parcial":"Pendiente"]);
  });
  downloadCSV(rows,"cumplimiento_capacitaciones.csv");
  alert("¡Exportado! Abrí el CSV con Excel.");
}

function renderUserCaps(){
  var u=state.currentUser;
  if(state.capacitaciones.length===0){document.getElementById("mainContent").innerHTML='<div class="card"><div class="empty-state"><div class="empty-icon">📚</div><div class="empty-title">Sin capacitaciones disponibles</div><p>El administrador aún no cargó capacitaciones.</p></div></div>';return;}
  var html='<div class="card"><div class="card-title">📚 Capacitaciones disponibles</div>';
  state.capacitaciones.forEach(function(c){
    var key=u.dni+"_"+c.id,cump=state.cumplimientos[key],aprobado=!!(cump&&cump.aprobado);
    html+='<div class="training-card" onclick="verCapacitacion(''+c.id+'')"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;"><div style="flex:1;min-width:0;"><h3>'+esc(c.titulo)+'</h3><div class="training-meta">'+(c.fileName?'<span>📄 '+esc(c.fileName)+'</span>':'')+'<span>❓ '+c.preguntas.length+' preguntas</span></div></div><span class="badge '+(aprobado?"badge-green":"badge-yellow")+'">'+(aprobado?"✅ "+cump.nota+"%":"📖 Pendiente")+'</span></div></div>';
  });
  html+="</div>";
  document.getElementById("mainContent").innerHTML=html;
}

function verCapacitacion(id){
  var c=state.capacitaciones.find(function(x){return x.id===id;});if(!c)return;
  var key=state.currentUser.dni+"_"+c.id,cump=state.cumplimientos[key],aprobado=!!(cump&&cump.aprobado);
  var fileSection="";
  if(c.fileData){
    if(c.fileType&&c.fileType.includes("pdf"))fileSection='<div style="margin-bottom:16px;"><div style="font-size:12px;font-weight:700;color:#6b5c4e;margin-bottom:8px;">📄 CONTENIDO DEL CURSO</div><div style="background:#f5f2ee;border:1px solid #e0d8cc;border-radius:8px;overflow:hidden;"><embed src="'+c.fileData+'" type="application/pdf" width="100%" height="480px" style="display:block;"></div></div>';
    else fileSection='<div style="margin-bottom:16px;"><div style="font-size:12px;font-weight:700;color:#6b5c4e;margin-bottom:8px;">📊 MATERIAL DE ESTUDIO</div><div style="background:#faf3e8;border:1px solid #e0d8cc;border-radius:8px;padding:20px;text-align:center;"><div style="font-size:36px;margin-bottom:8px;">📊</div><div style="font-size:14px;font-weight:600;color:#3a2317;margin-bottom:14px;">'+esc(c.fileName)+'</div><a href="'+c.fileData+'" download="'+esc(c.fileName)+'" style="display:inline-block;padding:10px 20px;background:#3a2317;color:white;border-radius:7px;font-size:13px;font-weight:700;text-decoration:none;">⬇ Descargar para visualizar</a></div></div>';
  }else fileSection='<div style="background:#f0f4f8;border-radius:8px;padding:20px;text-align:center;color:#a0aec0;margin-bottom:16px;">Sin archivo adjunto</div>';
  openModal('<div class="modal-header"><div class="modal-title">'+esc(c.titulo)+'</div><button class="close-btn" onclick="closeModal()">✕</button></div><div class="gold-bar"></div>'+fileSection+(aprobado?'<div class="approved-banner"><div style="font-size:28px;margin-bottom:4px;">🎓</div><div style="font-weight:800;color:var(--green);">¡Capacitación aprobada!</div><div style="font-size:12px;color:#2d6e44;margin-top:3px;">Nota: '+cump.nota+'% · '+cump.fecha+'</div></div>':'<button class="btn btn-brown" style="width:100%;padding:13px;font-size:15px;" onclick="startQuiz(''+c.id+'')">📝 Rendir evaluación</button><div style="font-size:12px;color:#6b5c4e;text-align:center;margin-top:8px;">Necesitás 70% o más para aprobar</div>'));
}

function startQuiz(id){
  var c=state.capacitaciones.find(function(x){return x.id===id;});if(!c)return;
  state.quizState={id:c.id,preguntas:c.preguntas,respuestas:Array(c.preguntas.length).fill(null),step:0};
  renderQuiz();
}

function renderQuiz(){
  var qs=state.quizState,q=qs.preguntas[qs.step],sel=qs.respuestas[qs.step],letters=["A","B","C"];
  var html='<div class="modal-header"><div class="modal-title">Evaluación — '+(qs.step+1)+' de '+qs.preguntas.length+'</div><button class="close-btn" onclick="closeModal()">✕</button></div><div class="gold-bar"></div>'+
    '<div class="progress-bar" style="margin-bottom:20px;height:6px;"><div class="progress-fill" style="width:'+Math.round(((qs.step+1)/qs.preguntas.length)*100)+'%"></div></div>'+
    '<div style="font-size:15px;font-weight:700;color:#3a2317;margin-bottom:18px;line-height:1.45;">'+esc(q.texto)+'</div>';
  q.opciones.forEach(function(opt,oi){html+='<div class="quiz-option'+(sel===oi?" selected":"")+'" onclick="selectAnswer('+oi+')"><div class="quiz-letter">'+letters[oi]+'</div><span>'+esc(opt)+'</span></div>';});
  html+='<div style="display:flex;gap:10px;margin-top:18px;">';
  if(qs.step>0)html+='<button class="btn btn-outline" onclick="quizPrev()">← Anterior</button>';
  if(qs.step<qs.preguntas.length-1)html+='<button class="btn btn-brown" style="flex:1;" onclick="quizNext()"'+(sel===null?' disabled':'')+'>Siguiente →</button>';
  else html+='<button class="btn btn-green" style="flex:1;" onclick="submitQuiz()"'+(sel===null?' disabled':'')+'>✅ Finalizar</button>';
  html+="</div>";
  openModal(html);
}

function selectAnswer(oi){state.quizState.respuestas[state.quizState.step]=oi;renderQuiz();}
function quizNext(){if(state.quizState.respuestas[state.quizState.step]===null)return;state.quizState.step++;renderQuiz();}
function quizPrev(){state.quizState.step--;renderQuiz();}

async function submitQuiz(){
  var qs=state.quizState,correctas=0;
  qs.preguntas.forEach(function(q,i){if(qs.respuestas[i]===q.respuesta)correctas++;});
  var nota=Math.round((correctas/qs.preguntas.length)*100),aprobado=nota>=70;
  if(aprobado){
    var key=state.currentUser.dni+"_"+qs.id;
    var data={aprobado:true,nota:nota,fecha:new Date().toLocaleDateString("es-AR"),nombre:state.currentUser.nombre,sector:state.currentUser.sector};
    showLoading("Registrando resultado...");
    try{await saveCumplimiento(key,data);state.cumplimientos[key]=data;}catch(e){console.error(e);}finally{hideLoading();}
  }
  openModal('<div style="text-align:center;padding:20px 10px;"><div style="font-size:60px;margin-bottom:12px;">'+(aprobado?"🎉":"😔")+'</div><div style="font-size:52px;font-weight:900;margin-bottom:6px;color:'+(aprobado?"var(--green)":"var(--red)")+';">'+nota+'%</div><div style="font-size:18px;font-weight:800;margin-bottom:10px;color:'+(aprobado?"var(--green)":"var(--red))")+'">'+(aprobado?"¡Aprobado!":"No aprobado")+'</div><div style="font-size:14px;color:var(--gray-text);line-height:1.5;">'+correctas+' respuestas correctas de '+qs.preguntas.length+'. '+(aprobado?"¡Capacitación completada con éxito!":"Se necesita 70% para aprobar. ¡Podés intentarlo nuevamente!")+'</div><div style="margin-top:22px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">'+ (!aprobado?'<button class="btn btn-outline" onclick="startQuiz(''+qs.id+'')">🔄 Intentar de nuevo</button>':'')+'<button class="btn btn-brown" onclick="closeModal();renderUserCaps()">Volver</button></div></div>');
}

function renderMisLogros(){
  var u=state.currentUser;
  var caps=state.capacitaciones.map(function(c){var key=u.dni+"_"+c.id,cump=state.cumplimientos[key];return{c:c,cump:cump,aprobado:!!(cump&&cump.aprobado)};});
  var aprobadas=caps.filter(function(x){return x.aprobado;}),pendientes=caps.filter(function(x){return!x.aprobado;});
  var pct=state.capacitaciones.length>0?Math.round((aprobadas.length/state.capacitaciones.length)*100):0;
  var html='<div class="card" style="text-align:center;padding:22px;"><div style="font-size:13px;color:#6b5c4e;font-weight:600;margin-bottom:6px;">TU PROGRESO GENERAL</div><div style="font-size:50px;font-weight:900;color:'+(pct===100?"var(--green)":"var(--brown)")+';">'+pct+'%</div><div class="progress-bar" style="margin:14px 0;height:10px;"><div class="progress-fill '+(pct===100?"full":"")+'" style="width:'+pct+'%"></div></div><div style="font-size:13px;color:#6b5c4e;">'+aprobadas.length+' de '+state.capacitaciones.length+' capacitaciones completadas</div>'+(pct===100?'<div style="margin-top:10px;font-size:13px;font-weight:700;color:var(--green);">🎓 ¡Completaste todas las capacitaciones!</div>':'')+'</div>';
  if(aprobadas.length>0){html+='<div class="card"><div class="card-title">✅ Aprobadas</div>'+aprobadas.map(function(x){return'<div class="training-card" style="cursor:default;border-color:#a8d5b5;background:#f6fbf8;"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;"><div><h3 style="color:var(--green);">✅ '+esc(x.c.titulo)+'</h3><div class="training-meta"><span>Nota: '+x.cump.nota+'%</span><span>📅 '+(x.cump.fecha||"")+'</span></div></div><span class="badge badge-green">Aprobada</span></div></div>';}).join("")+'</div>';}
  if(pendientes.length>0){html+='<div class="card"><div class="card-title">⏳ Pendientes</div>'+pendientes.map(function(x){return'<div class="training-card" onclick="verCapacitacion(''+x.c.id+'')"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;"><div><h3>'+esc(x.c.titulo)+'</h3><div class="training-meta"><span>Tocá para ver y rendir</span></div></div><span class="badge badge-yellow">Pendiente</span></div></div>';}).join("")+'</div>';}
  if(state.capacitaciones.length===0){html+='<div class="card"><div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Sin capacitaciones aún</div></div></div>';}
  document.getElementById("mainContent").innerHTML=html;
}

function downloadCSV(rows,filename){
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("
");
  var blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download=filename;a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}

loadState().then(function(){
  hideLoading();
  document.getElementById("loginScreen").style.display="flex";
}).catch(function(e){
  console.error(e);
  document.getElementById("loadingMsg").textContent="Error al conectar. Recargá la página.";
});
</script>
